<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Haunted Ghost 👻</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    color: white;
    font-family: monospace;
    text-align: center;
}

.ghost {
    font-size: 130px;
    animation: float 3s ease-in-out infinite;
    cursor: pointer;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

input {
    padding: 12px;
    width: 60%;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: darkred;
    color: white;
    cursor: pointer;
}

.response {
    margin-top: 20px;
    min-height: 40px;
    padding: 20px;
}

.jump-scare {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 200px;
}
</style>
</head>

<body>

<h1>👻 AI Haunted Ghost 👻</h1>

<div class="ghost" onclick="petGhost()">👻</div>

<p>Ask me anything... I truly understand now.</p>

<input type="text" id="question" placeholder="Ask your spooky question...">
<button onclick="askGhost()">Ask</button>

<div class="response" id="response"></div>

<div class="jump-scare" id="jumpscare">👹</div>

<script src="./config.js"></script>
<script>
const isGithubPages = window.location.hostname.endsWith("github.io");
const configuredBase = window.GHOST_API_BASE || "";
const apiBase = configuredBase.replace(/\/$/, "");

function getApiUrl(path) {
    if (!apiBase && isGithubPages) {
        return null;
    }

    if (!apiBase) {
        return path;
    }

    return `${apiBase}${path}`;
}

async function askGhost() {
    const input = document.getElementById("question").value;
    const responseBox = document.getElementById("response");

    if (!input.trim()) {
        responseBox.innerText = "Speak clearly, mortal...";
        return;
    }

    if (Math.random() < 0.2) {
        triggerJumpScare();
        return;
    }

    const askUrl = getApiUrl("/api/ask");
    if (!askUrl) {
        responseBox.innerText = "GitHub Pages cannot run backend code. Add GHOST_API_BASE in config.js to point to your deployed API.";
        return;
    }

    responseBox.innerText = "The ghost is thinking... 👁";

    try {
        const res = await fetch(askUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                question: input
            })
        });

        const data = await res.json();

        if (!res.ok) {
            responseBox.innerText = data.error || "The spirit world is disconnected...";
            return;
        }

        responseBox.innerText = data.answer;

    } catch (err) {
        responseBox.innerText = "The spirit world is disconnected...";
    }
}

function petGhost() {
    document.getElementById("response").innerText =
        "Hehehe... careful... I might haunt your browser 👻";
}

function triggerJumpScare() {
    const scare = document.getElementById("jumpscare");
    scare.style.display = "flex";

    setTimeout(() => {
        scare.style.display = "none";
        document.getElementById("response").innerText =
            "BOOOO! 😈 Now ask again...";
    }, 700);
}
</script>

</body>
</html>
