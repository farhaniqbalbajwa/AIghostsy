<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Haunted Ghost 👻</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    color: white;
    font-family: monospace;
    text-align: center;
}

.ghost {
    font-size: 130px;
    animation: float 3s ease-in-out infinite;
    cursor: pointer;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

input {
    padding: 12px;
    width: 60%;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: darkred;
    color: white;
    cursor: pointer;
}

.response {
    margin-top: 20px;
    min-height: 40px;
    padding: 20px;
}

.jump-scare {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 200px;
}
</style>
</head>

<body>

<h1>👻 AI Haunted Ghost 👻</h1>

<div class="ghost" onclick="petGhost()">👻</div>

<p>Ask me anything... I truly understand now.</p>

<input type="text" id="question" placeholder="Ask your spooky question...">
<button onclick="askGhost()">Ask</button>

<div class="response" id="response"></div>

<div class="jump-scare" id="jumpscare">👹</div>

<script>
const API_KEY = "https://chatgpt.com/g/g-69a25d6c53348191b7580bfb6b0f29e5-aighostsy";  // ⚠️ Replace

async function askGhost() {
    const input = document.getElementById("question").value;
    const responseBox = document.getElementById("response");

    if (!input.trim()) {
        responseBox.innerText = "Speak clearly, mortal...";
        return;
    }

    // 20% jump scare chance
    if (Math.random() < 0.2) {
        triggerJumpScare();
        return;
    }

    responseBox.innerText = "The ghost is thinking... 👁";

    try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    {
                        role: "system",
                        content: "You are a scary but cute ghost. You answer intelligently like ChatGPT but in a spooky playful tone. Sometimes be slightly mischievous."
                    },
                    {
                        role: "user",
                        content: input
                    }
                ],
                temperature: 0.8
            })
        });

        const data = await res.json();
        responseBox.innerText = data.choices[0].message.content;

    } catch (err) {
        responseBox.innerText = "The spirit world is disconnected...";
    }
}

function petGhost() {
    document.getElementById("response").innerText =
        "Hehehe... careful... I might haunt your browser 👻";
}

function triggerJumpScare() {
    const scare = document.getElementById("jumpscare");
    scare.style.display = "flex";

    setTimeout(() => {
        scare.style.display = "none";
        document.getElementById("response").innerText =
            "BOOOO! 😈 Now ask again...";
    }, 700);
}
</script>

</body>
</html>
